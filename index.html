<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architetto e BIM Coordinator a Firenze | R.Dolfini Arch.</title>
  <meta name="description" content="Studio di architettura e consulenza BIM a Firenze. Progettazione architettonica, rilievo e modellazione BIM, rendering 3D.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Architetto e BIM Coordinator a Firenze | R.Dolfini Arch.">
  <meta property="og:description" content="Progettazione architettonica e consulenza BIM a Firenze.">
  <meta property="og:url" content="https://www.rdolfiniarch.it/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script>if(sessionStorage.getItem('rdarch-intro')){document.documentElement.classList.add('intro-skip');}</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:      #FAFAF8;
      --color-text:    #1A1A1A;
      --color-accent:  #B85C38;
      --font-sans:     'DM Sans', sans-serif;
      --font-serif:    'Instrument Serif', serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: #0d0d0d;
      cursor: none;
    }

    /* ---- Video background ---- */
    .cs-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .cs-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.55);
      z-index: 1;
    }

    /* ---- Griglia architettonica ---- */
    .cs-grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ---- Layout centrato ---- */
    .cs-wrap {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    .cs-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      margin-bottom: 1.25rem;
      opacity: 0.9;
    }

    .cs-name {
      font-family: var(--font-sans);
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 1rem;
    }

    .cs-status {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.35rem 0.85rem;
      margin-bottom: 2.5rem;
    }

    .cs-divider {
      width: 40px;
      height: 1px;
      background: var(--color-accent);
      margin: 0 auto 2.5rem;
    }

    .cs-tagline {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(1.5rem, 3.5vw, 2.25rem);
      font-weight: 400;
      color: #ffffff;
      line-height: 1.35;
      max-width: 600px;
      margin-bottom: 1.25rem;
    }

    .cs-desc {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.02em;
      margin-bottom: 2.5rem;
    }

    .cs-btn {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 0.85rem 2rem;
      transition: border-color 0.25s ease, background 0.25s ease;
    }

    .cs-btn:hover {
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.06);
    }

    /* ---- Custom cursor ---- */
    .custom-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: transparent;
      border: none;
      box-shadow: 0 0 0 0.5px #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: #ffffff;
      font-size: 16px;
      font-weight: 300;
      line-height: 1;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease, width 0.25s ease, height 0.25s ease;
      z-index: 10001;
      mix-blend-mode: difference;
      will-change: transform;
    }

    .custom-cursor--hovering {
      width: 72px;
      height: 72px;
    }

    /* ---- Intro screen ---- */
    .site-intro {
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }

    .intro-skip .site-intro { display: none; }

    .site-intro.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .site-intro__inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 160px;
      height: 160px;
    }

    .site-intro__logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .site-intro__arc {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .site-intro__circle {
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      animation: arcDraw 1.2s ease forwards 0.2s;
    }

    @keyframes arcDraw {
      to { stroke-dashoffset: 0; }
    }

    .cs-mail {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      padding-bottom: 2px;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .cs-mail:hover {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 600px) {
      .cs-tagline { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <video class="cs-video" autoplay muted loop playsinline>
    <source src="immagini/hero-bg.mp4" type="video/mp4">
  </video>
  <div class="cs-overlay"></div>

  <svg class="cs-grid" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <pattern id="gs" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#B85C38" stroke-width="0.4" opacity="0.5"/>
      </pattern>
      <pattern id="gl" x="0" y="0" width="300" height="300" patternUnits="userSpaceOnUse">
        <rect width="300" height="300" fill="url(#gs)"/>
        <path d="M 300 0 L 0 0 0 300" fill="none" stroke="#B85C38" stroke-width="0.9" opacity="0.7"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#gl)" opacity="0.07"/>
  </svg>

  <div class="cs-wrap">
    <img src="immagini/Logo%20Personale.png" alt="" class="cs-logo" aria-hidden="true">
    <p class="cs-name">R.Dolfini <span style="opacity:.6">Arch.</span></p>
    <span class="cs-status">Sito in costruzione</span>
    <div class="cs-divider"></div>
    <p class="cs-tagline">Architettura <em>e&rsquo; tradizione</em><br>che interroga il futuro</p>
    <p class="cs-desc">Progettazione architettonica e consulenza BIM a Firenze.</p>
    <a href="mailto:robertodolfiniarch@gmail.com" class="cs-mail">robertodolfiniarch@gmail.com</a>
  </div>

  <!-- Intro screen -->
  <div class="site-intro" id="siteIntro" aria-hidden="true">
    <div class="site-intro__inner">
      <img src="immagini/Logo%20Personale.png" alt="" class="site-intro__logo">
      <svg class="site-intro__arc" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="80" cy="80" r="70" stroke="#B85C38" stroke-width="1" transform="rotate(-90 80 80)" class="site-intro__circle"/>
      </svg>
    </div>
  </div>

  <script>
    (function () {
      /* Intro */
      var intro = document.getElementById('siteIntro');
      if (intro) {
        sessionStorage.setItem('rdarch-intro', '1');
        setTimeout(function () {
          intro.classList.add('is-hidden');
          intro.addEventListener('transitionend', function () { intro.remove(); }, { once: true });
        }, 1700);
      }

      /* Custom cursor */
      var cur = document.createElement('div');
      cur.className = 'custom-cursor';
      cur.textContent = '+';
      document.body.appendChild(cur);

      var mp = { x: 0, y: 0 }, cp = { x: 0, y: 0 }, spd = 0.3, vis = false, hov = false;
      var touch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

      if (!touch) {
        document.addEventListener('mousemove', function (e) {
          mp.x = e.clientX; mp.y = e.clientY;
          if (!vis) { vis = true; cur.style.opacity = '1'; }
          var isHov = !!(e.target.closest('a, button') || window.getComputedStyle(e.target).cursor === 'pointer');
          if (isHov !== hov) { hov = isHov; cur.classList.toggle('custom-cursor--hovering', isHov); }
        });
        document.addEventListener('mouseleave', function () { vis = false; cur.style.opacity = '0'; });
        (function loop() {
          cp.x += (mp.x - cp.x) * spd;
          cp.y += (mp.y - cp.y) * spd;
          cur.style.transform = 'translate(' + cp.x + 'px, ' + cp.y + 'px) translate(-50%, -50%)';
          requestAnimationFrame(loop);
        })();
      } else {
        cur.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
